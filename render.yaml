services:
  - type: web
    name: businessapp-backend
    runtime: go
    plan: free
    buildCommand: go build -tags netgo -ldflags "-s -w" -o app ./cmd/api
    startCommand: ./app
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: business_app
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ORIGIN
        value: "*"
